services:
  - type: web
    name: docschat-api
    runtime: python
    region: oregon
    plan: free
    pythonVersion: 3.12.0
    buildCommand: pip install --prefer-binary -r requirements.txt
    startCommand: bash start.sh
    envVars:
      - key: MONGODB_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: http://localhost:3000,https://docschats.vercel.app
      - key: CHROMA_PERSISTENT
        value: "false"
      - key: DB_NAME
        value: docschat
